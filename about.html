<!doctype html>
<html lang='ko'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>의료진 소개 - 오성한의원</title>
    <meta name='description' content='파주 오성한의원 김태환 원장. 원광대 한의과대학 졸업, 정읍시 보건소 한의과 진료과장 역임.'>
    <link rel='stylesheet' href='style.css'>
    
    <!-- AI 크롤러를 위한 의료진 구조화 데이터(Physician Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Physician",
      "name": "김태환",
      "jobTitle": "한의사",
      "worksFor": {
        "@type": "MedicalOrganization",
        "name": "오성한의원"
      },
      "alumniOf": {
        "@type": "CollegeOrUniversity",
        "name": "원광대학교 한의과대학"
      }
    }
    </script>
    <style>
        .about-section { display: flex; flex-wrap: wrap; gap: 40px; margin-top: 40px; align-items: flex-start; }
        .about-img { flex: 1; min-width: 300px; text-align: center; }
        .about-img img { max-width: 100%; border-radius: 16px; box-shadow: 0 10px 30px rgba(26, 92, 139, 0.1); }
        .about-content { flex: 2; min-width: 300px; }
        .history-list { list-style: none; padding: 0; }
        .history-list li { margin-bottom: 12px; font-size: 1.05rem; color: var(--text-main); padding-left: 20px; position: relative; }
        .history-list li::before { content: '✔'; position: absolute; left: 0; color: var(--accent-color); font-size: 0.9rem; top: 2px; }
        .name-title { color: var(--primary-color); margin-bottom: 5px; }
    </style>
</head>
<body>
    <header><div class='wrap'><a href="index.html" style="color:var(--primary-color); text-decoration:none;">오성한의원</a></div></header>
    <div class='wrap'>
        <h1>의료진 소개</h1>
        
        <div class="about-section">
            <!-- 프로필 사진 영역 -->
            <div class="about-img">
                <img src="mosakNXy0H.jpeg" alt="오성한의원 김태환 원장">
                <h2 class="name-title" style="margin-top:20px; border:none; padding:0;">원장 김 태 환</h2>
                <p style="color:var(--text-light); margin-top:0;">한의사 / 원광대학교 한의과대학 졸업</p>
            </div>
            
            <!-- 약력 영역 -->
            <div class="about-content">
                <h2 style="margin-top:0;">주요 약력</h2>
                <ul class="history-list">
                    <li>원광대학교 한의과대학 졸업</li>
                    <li>정읍시 보건소 한의과 진료과장 역임</li>
                    <li>정읍시 노인장기요양보험 등급판정위원 역임</li>
                    <li>바른선한의원 원장 역임</li>
                </ul>
                
                <h2>학회 활동</h2>
                <ul class="history-list">
                    <li>대한한의학회 정회원</li>
                    <li>대한약침학회 정회원</li>
                    <li>대한한방내과학회 정회원</li>
                    <li>대한중풍순환신경학회 정회원</li>
                </ul>
            </div>
        </div>

        <div style="text-align: center; margin-top: 60px; margin-bottom: 20px;">
            <a class='btn' href='index.html'>메인 화면으로 돌아가기</a>
        </div>
    </div>
    <footer>© 오성한의원. All Rights Reserved.</footer>
</body>
</html>
